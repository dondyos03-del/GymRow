<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymRow — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <div class="logo-area">
    <img src="logo.jpg" alt="GymRow" style="width:220px; border-radius:12px;" />
  </div>

  <div id="msg" class="msg" style="display:none"></div>

  <div class="card fade-in">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="flex-row mt-8">
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <button class="btn btn-secondary" onclick="doSignup()">Sign Up</button>
    </div>
  </div>

  <p class="text-center text-muted mt-16">
    Enter your email to get started
  </p>

</div>
<script src="app.js"></script>
<script>
  // If already logged in, redirect
  const existing = getSession();
  if (existing && existing.email) {
    if (!existing.name) window.location.href = 'signup-details.html';
    else if (!existing.subscription) window.location.href = 'subscription.html';
    else window.location.href = 'home.html';
  }

  function getEmail() {
    const e = document.getElementById('email').value.trim().toLowerCase();
    if (!e || !e.includes('@')) {
      showMsg(document.getElementById('msg'), 'Please enter a valid email address.');
      return null;
    }
    return e;
  }

  async function doLogin() {
    const email = getEmail();
    if (!email) return;
    const data = await apiPost('/login', { email });
    if (data.error) {
      showMsg(document.getElementById('msg'), data.error);
      alert(data.error);
      return;
    }
    setSession(data.user);
    const u = data.user;
    if (!u.name) window.location.href = 'signup-details.html';
    else if (!u.subscription) window.location.href = 'subscription.html';
    else window.location.href = 'home.html';
  }

  async function doSignup() {
    const email = getEmail();
    if (!email) return;
    const data = await apiPost('/signup', { email });
    if (data.error) {
      showMsg(document.getElementById('msg'), data.error);
      alert(data.error);
      return;
    }
    setSession(data.user);
    window.location.href = 'signup-details.html';
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
